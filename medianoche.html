<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11.05 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg: #080510;
    --purple: #2e1a47;
    --violet: #6b3fa0;
    --rose: #c4637a;
    --pink: #e8a0b4;
    --white: #f8f0f4;
    --muted: #8a6a78;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    color: var(--white);
  }

  /* ── CANVAS BG ── */
  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ── MAIN ── */
  .scene {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  /* date tag */
  .date-tag {
    font-size: .7rem;
    letter-spacing: .3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: rise .8s ease forwards .3s;
  }

  /* big number */
  .year-num {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 22vw, 11rem);
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(160deg, var(--white) 0%, var(--pink) 40%, var(--violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: rise .9s ease forwards .6s;
    position: relative;
  }

  .year-num::after {
    content: 'año';
    display: block;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 5vw, 2.5rem);
    font-weight: 400;
    background: linear-gradient(90deg, var(--pink), var(--violet));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-top: -.3em;
    letter-spacing: .1em;
  }

  /* divider */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    margin: 1.8rem auto;
    opacity: 0;
    animation: rise .7s ease forwards 1s;
  }

  /* message */
  .msg {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    line-height: 1.7;
    color: var(--white);
    max-width: 420px;
    opacity: 0;
    animation: rise .9s ease forwards 1.2s;
  }

  .msg span {
    color: var(--pink);
  }

  /* sub */
  .sub {
    margin-top: 1.5rem;
    font-size: clamp(.8rem, 2.5vw, .95rem);
    color: var(--muted);
    letter-spacing: .08em;
    opacity: 0;
    animation: rise .7s ease forwards 1.7s;
  }

  /* floating hearts */
  .heart {
    position: fixed;
    pointer-events: none;
    z-index: 3;
    font-size: 1.2rem;
    animation: floatUp linear forwards;
    opacity: 0;
  }

  @keyframes floatUp {
    0%   { opacity: 0; transform: translateY(0) scale(.8); }
    15%  { opacity: .9; }
    80%  { opacity: .5; }
    100% { opacity: 0; transform: translateY(-100vh) scale(.4) rotate(25deg); }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* glow ring */
  .glow-ring {
    position: fixed;
    width: min(500px, 90vw);
    height: min(500px, 90vw);
    border-radius: 50%;
    border: 1px solid rgba(196,99,122,.12);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    box-shadow:
      0 0 60px rgba(107,63,160,.15),
      inset 0 0 60px rgba(196,99,122,.08);
    animation: breathe 5s ease-in-out infinite;
  }

  .glow-ring-2 {
    position: fixed;
    width: min(750px, 130vw);
    height: min(750px, 130vw);
    border-radius: 50%;
    border: 1px solid rgba(107,63,160,.07);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
    animation: breathe 7s ease-in-out infinite reverse;
  }

  @keyframes breathe {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .6; }
    50%      { transform: translate(-50%,-50%) scale(1.04); opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div class="glow-ring"></div>
<div class="glow-ring-2"></div>

<div class="scene">
  <p class="date-tag">11 · 05 · 2024 → 11 · 05 · 2025</p>
  <div class="year-num">1</div>
  <div class="divider"></div>
  <p class="msg">
    Un año contigo, <span>mami</span>.<br>
    Y aún no encuentro las palabras<br>
    para decirte lo que significas.
  </p>
  <p class="sub">feliz aniversario, mi niña 💖</p>
</div>

<script>
// ── STARFIELD + PETALS ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// stars
const stars = Array.from({length: 180}, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.2 + .2,
  phase: Math.random() * Math.PI * 2,
  speed: Math.random() * .008 + .003
}));

// particles
const particles = Array.from({length: 35}, () => ({
  x: Math.random(), y: Math.random(),
  vx: (Math.random() - .5) * .0003,
  vy: -Math.random() * .0004 - .0001,
  r: Math.random() * 2 + .5,
  color: Math.random() > .5 ? '#c4637a' : '#6b3fa0',
  alpha: Math.random() * .5 + .1
}));

let t = 0;
function draw() {
  t += .012;
  ctx.clearRect(0, 0, W, H);

  // deep bg gradient
  const grad = ctx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, Math.max(W,H)*.7);
  grad.addColorStop(0, '#130a1e');
  grad.addColorStop(.5, '#0c0614');
  grad.addColorStop(1, '#080510');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // stars
  stars.forEach(s => {
    s.phase += s.speed;
    const a = (.4 + .6 * Math.abs(Math.sin(s.phase)));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(248,220,235,${a})`;
    ctx.fill();
  });

  // floating particles
  particles.forEach(p => {
    p.x += p.vx + Math.sin(t + p.y*10) * .0001;
    p.y += p.vy;
    if (p.y < -.02) { p.y = 1.02; p.x = Math.random(); }
    ctx.beginPath();
    ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.alpha * (.5 + .5*Math.sin(t + p.phase||0));
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  requestAnimationFrame(draw);
}
draw();

// ── FLOATING HEARTS ──
const emojis = ['💖','💗','💕','🩷','✨','💜'];
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  h.style.left = (10 + Math.random()*80) + 'vw';
  h.style.bottom = '-2rem';
  const dur = 6 + Math.random()*6;
  h.style.animationDuration = dur + 's';
  h.style.fontSize = (.8 + Math.random()*1) + 'rem';
  document.body.appendChild(h);
  setTimeout(() => h.remove(), dur*1000);
}

// start spawning after page loads
setTimeout(() => {
  spawnHeart();
  setInterval(spawnHeart, 900);
}, 1800);
</script>
</body>
</html>
